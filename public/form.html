<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Registration | Pak Debate Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
      background: #0f1115;
      color: #e5e7eb;
      padding: 20px;
      min-height: 100vh;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(15, 17, 21, 0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin: -20px -20px 40px -20px;
      padding: 16px 20px;
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      color: #d4af37;
      font-weight: 600;
      font-size: 18px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.2s;
      font-size: 14px;
    }

    .nav-links a:hover {
      color: #d4af37;
    }

    .form-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .form-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .form-header h1 {
      font-size: 28px;
      color: #d4af37;
      margin-bottom: 12px;
    }

    .form-header p {
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.6;
    }

    .form-card {
      background: linear-gradient(180deg, rgba(21,25,35,0.8), rgba(21,25,35,0.5));
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 12px;
      padding: 32px 24px;
    }

    #form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 8px;
      font-size: 14px;
    }

    label.required::after {
      content: " *";
      color: #ef4444;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      background: rgba(15, 17, 21, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #d4af37;
      background: rgba(15, 17, 21, 0.8);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    /* Fix autofill styling */
    input[type="tel"]:-webkit-autofill,
    input[type="tel"]:-webkit-autofill:hover,
    input[type="tel"]:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(15, 17, 21, 0.6) inset !important;
      -webkit-text-fill-color: #e5e7eb !important;
      border: 1px solid rgba(212, 175, 55, 0.2) !important;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 20px;
      padding-right: 40px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .btn-submit {
      background: #d4af37;
      color: #071019;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      width: 100%;
    }

    .btn-submit:hover {
      background: #c78f2a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .loading p {
      color: #9ca3af;
      font-size: 16px;
    }

    .error-state {
      text-align: center;
      padding: 60px 20px;
    }

    .error-state h2 {
      color: #ef4444;
      margin-bottom: 12px;
    }

    .error-state p {
      color: #9ca3af;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      color: #86efac;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(212, 175, 55, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .navbar {
        margin: -12px -12px 24px -12px;
        padding: 12px;
        flex-wrap: wrap;
      }

      .nav-links {
        width: 100%;
        margin-top: 12px;
        gap: 12px;
        font-size: 13px;
      }

      .form-container {
        padding: 12px;
      }

      .form-header {
        margin-bottom: 24px;
      }

      .form-header h1 {
        font-size: 24px;
      }

      .form-card {
        padding: 20px;
      }

      input, textarea, select {
        padding: 11px;
        font-size: 16px; /* Prevents zoom on iOS */
      }

      .btn-submit {
        padding: 12px 20px;
        font-size: 15px;
      }
    }

    footer {
      margin-top: 60px;
      padding: 30px 20px 20px;
      text-align: center;
      color: #6f6f6f;
      font-size: 13px;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="nav-brand">Pak Debate Forum</div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="resources.html">Resources</a>
  </nav>
</header>

<div class="form-container">
  <div class="form-header">
    <h1 id="eventTitle">Loading...</h1>
    <p id="eventDesc"></p>
  </div>

  <div class="form-card">
    <div id="loadingState">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 12px;">Loading registration form...</p>
      </div>
    </div>

    <div id="errorState" style="display:none;" class="error-state">
      <h2>Error Loading Form</h2>
      <p id="errorMessage">Unable to load the registration form. Please try again.</p>
    </div>

    <form id="form" style="display:none;"></form>
  </div>
</div>

<footer>
  <p>© 2025 Pak Debate Forum. All rights reserved.</p>
</footer>

<script>
const params = new URLSearchParams(location.search);
const eventId = params.get("id");

function showError(message) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('errorMessage').textContent = message;
}

function showForm() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('form').style.display = 'flex';
}

if (!eventId) {
  showError("Invalid event ID. Please select an event from the Events page.");
}

async function loadForm() {
  try {
    const res = await fetch(`/api/form?id=${eventId}`);
    if (!res.ok) {
      showError(`Server error: ${res.status}`);
      return;
    }

    const data = await res.json();

    if (!data.success || !data.event || !data.questions) {
      showError(data.message || "Event not found. Please select a valid event.");
      return;
    }

    // Set event title and description
    document.getElementById("eventTitle").textContent = data.event.title;
    document.getElementById("eventDesc").textContent = data.event.description || "Register for this event to participate.";

    const form = document.getElementById("form");
    form.innerHTML = ''; // Clear previous content

    console.log("Loading form for event:", data.event.title);
    console.log("Questions:", data.questions);

    // Create form fields dynamically
    data.questions.forEach(q => {
      const group = document.createElement("div");
      group.className = "form-group";

      const label = document.createElement("label");
      label.textContent = q.question_text;
      if (q.required) label.classList.add("required");

      let input;

      if (q.type === "select") {
        input = document.createElement("select");
        const options = typeof q.options === "string"
          ? JSON.parse(q.options)
          : q.options || [];

        const emptyOpt = document.createElement("option");
        emptyOpt.value = "";
        emptyOpt.textContent = "-- Select --";
        input.appendChild(emptyOpt);

        options.forEach(opt => {
          const o = document.createElement("option");
          o.value = opt;
          o.textContent = opt;
          input.appendChild(o);
        });

      } else if (q.type === "textarea") {
        input = document.createElement("textarea");
        input.placeholder = "Enter your response...";

      } else {
        input = document.createElement("input");
        input.type = q.type || "text";
        input.placeholder = `Enter ${q.question_text.toLowerCase()}...`;
        
        // Add phone number validation if type is tel or phone
        if (q.type === "tel" || q.type === "phone" || q.question_text.toLowerCase().includes("phone")) {
          input.type = "tel";
          input.pattern = "[0-9]*";
          input.inputMode = "numeric";
          
          // Prevent non-numeric input
          input.addEventListener("input", (e) => {
            e.target.value = e.target.value.replace(/[^0-9\-\+\s]/g, "");
          });
        }
      }

      input.name = "q_" + q.id;
      if (q.required) input.required = true;

      group.appendChild(label);
      group.appendChild(input);
      form.appendChild(group);
    });

    // Add submit button
    const submitBtn = document.createElement("button");
    submitBtn.textContent = "Submit Registration";
    submitBtn.type = "submit";
    submitBtn.className = "btn-submit";
    form.appendChild(submitBtn);

    showForm();

    // Handle form submission
    form.onsubmit = async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const answers = data.questions.map(q => ({
          question_id: Number(q.id),
          answer_text: form.querySelector(`[name="q_${q.id}"]`)?.value || ""
        }));

        const payload = {
          event_id: eventId,  // Keep as string - schema expects TEXT
          answers
        };

        console.log("Submitting payload:", payload);

        const submitRes = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await submitRes.json();

        if (result.success) {
          // Show success and reset
          form.innerHTML = '<div class="success-message" style="padding: 24px;"><h2 style="color: #22c55e; margin: 0 0 8px 0;">✓ Registration Successful!</h2><p style="margin: 0;">Thank you for registering. We will contact you soon.</p></div>';
          setTimeout(() => window.location.href = 'events.html', 3000);
        } else {
          console.error('Submit failed:', result);
          showError(`Registration failed: ${result.error || result.message || 'Unknown error'}`);
        }
      } catch (error) {
        console.error('Submission error:', error);
        showError('Submission failed. Please check your connection and try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Registration";
      }
    };

  } catch (error) {
    console.error('Form loading error:', error);
    showError('Failed to load the registration form. Please try again.');
  }
}

// Load form when page is ready
document.addEventListener('DOMContentLoaded', loadForm);
</script>


</body>
</html>
